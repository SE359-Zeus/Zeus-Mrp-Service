services:
  # 1. The Network Gateway
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-gw
    hostname: sales-be-service
    environment:
      - TS_AUTHKEY=tskey-auth-yourKeyHere # Generate this in Tailscale Admin Console
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

  # 2. One-shot migration job
  sales-migrate:
    image: ghcr.io/se359-zeus/zeus-be/sales:${SALES_IMAGE_TAG:-latest}
    command: ["./migrate", "-db", "/app/data/sales.db"]
    volumes:
      - sqlite_data:/app/data
    restart: "no"

  # 3. One-shot seeder job
  sales-seed:
    image: ghcr.io/se359-zeus/zeus-be/sales:${SALES_IMAGE_TAG:-latest}
    command: ["./seeder", "-db", "/app/data/sales.db"]
    volumes:
      - sqlite_data:/app/data
    depends_on:
      sales-migrate:
        condition: service_completed_successfully
    restart: "no"

  # 4. Valkey (Redis-compatible)
  valkey:
    image: valkey/valkey:latest
    network_mode: "service:tailscale"
    restart: unless-stopped

  # 5. Sales backend server
  sales-be:
    image: ghcr.io/se359-zeus/zeus-be/sales:${SALES_IMAGE_TAG:-latest}
    network_mode: "service:tailscale"
    environment:
      SALES_SQLITE_DB: /app/data/sales.db
      SALES_VALKEY_ADDR: localhost:6379
      SALES_PORT: 8082
      SALES_BASE_URL: http://localhost:8082
    volumes:
      - sqlite_data:/app/data
    depends_on:
      sales-seed:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    restart: unless-stopped

  # 6. SQLite Client (for manual CLI access)
  sqlite-client:
    image: alpine:latest
    volumes:
      - sqlite_data:/data
    command: sh -c "apk add --no-cache sqlite && tail -f /dev/null"
    restart: unless-stopped

volumes:
  sqlite_data:
  tailscale-state:
