<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Zeus Sales API - Swagger UI</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4/swagger-ui.css" />
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-bundle.js"></script>
    <style>
      body { background:#0b0f14; color:#e6eef3; }
      .swagger-ui .topbar { background: #071222; }
      .swagger-ui .opblock { background: #071826; color: #e6eef3; }
      .swagger-ui .opblock-summary-method { color: #fff !important; }
      .swagger-ui .scheme-container { background: transparent; }
      .swagger-ui .info { color: #e6eef3; }
    </style>
    <script>
      window.ui = SwaggerUIBundle({
        url: '/docs/openapi.yaml',
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis],
        layout: 'SidebarLayout',
        tryItOutEnabled: true
      })
    </script>
  </body>
</html>
